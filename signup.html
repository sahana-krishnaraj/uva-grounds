<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="events-uva.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">UVA &amp; Cville</a>
      <a href="login.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">Log in</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Join the UVA network</h1>
      <p class="auth-lead">Create an account with your @virginia.edu email and password — next step is profile setup.</p>

      <div class="trust-row">
        <span class="trust-pill">Closed network</span>
        <span class="trust-pill">Trust &gt; anonymity</span>
      </div>

      <form id="signup-form" novalidate>
        <label for="email">UVA email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@virginia.edu"
          required
          pattern=".+@virginia\.edu$"
          title="Must be a @virginia.edu address"
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="new-password"
          placeholder="At least 6 characters"
          required
          minlength="6"
        />

        <label for="password-confirm">Confirm password</label>
        <input
          id="password-confirm"
          name="password-confirm"
          type="password"
          autocomplete="new-password"
          placeholder="Re-enter password"
          required
          minlength="6"
        />

        <button type="submit" class="btn btn-primary btn-full" id="signup-submit">
          Create account
        </button>
      </form>

      <p id="signup-msg" class="auth-form-msg" style="display: none; margin-top: 0.75rem; font-size: 0.88rem"></p>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="js/session.js"></script>
  <script type="module">
    import { supabase } from "./js/supabase.js";

    var form = document.getElementById("signup-form");
    var msg = document.getElementById("signup-msg");
    var btn = document.getElementById("signup-submit");

    function showError(text) {
      msg.style.display = "";
      msg.style.color = "red";
      msg.textContent = text;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      msg.style.display = "none";

      var pw = document.getElementById("password").value;
      var pw2 = document.getElementById("password-confirm").value;
      if (pw !== pw2) {
        showError("Passwords do not match.");
        return;
      }

      if (!form.reportValidity()) return;

      var email = document.getElementById("email").value.trim();

      btn.disabled = true;
      btn.textContent = "Creating account…";

      const { data, error } = await supabase.auth.signUp({
        email: email,
        password: pw,
      });

      if (error) {
        showError(error.message || "Could not sign up. Try again.");
        btn.disabled = false;
        btn.textContent = "Create account";
        return;
      }

      if (!data.session) {
        await supabase.auth.signInWithPassword({ email: email, password: pw });
      }

      if (window.HoosOutSession) window.HoosOutSession.signIn();
      window.location.href = "profile.html";
    });
  </script>
</body>
</html>
