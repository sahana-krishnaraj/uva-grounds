<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign up — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="events-uva.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">UVA &amp; Cville</a>
      <a href="login.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">Log in</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Join the UVA network</h1>
      <p class="auth-lead">Demo: sign up with UVA SSO or your @virginia.edu email — no separate email code step.</p>

      <div class="trust-row">
        <span class="trust-pill">Closed network</span>
        <span class="trust-pill">Trust &gt; anonymity</span>
      </div>

      <button type="button" class="btn btn-primary btn-full" id="btn-sso">
        Sign up with UVA SSO
      </button>

      <div class="divider">or with school email</div>

      <form id="signup-form" novalidate>
        <label for="email">School email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@virginia.edu"
          required
          pattern=".+@virginia\.edu$"
          title="Must be @virginia.edu"
        />
        <label for="name">Preferred name</label>
        <input id="name" name="name" type="text" autocomplete="given-name" placeholder="Alex" required />
        <button type="submit" class="btn btn-ghost btn-full" id="signup-submit">Continue</button>
      </form>
      <p id="signup-msg" class="auth-form-msg" style="display: none; margin-top: 0.75rem; font-size: 0.88rem"></p>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="js/session.js"></script>
  <script>
    document.getElementById("btn-sso").addEventListener("click", function () {
      window.location.href = "verify.html?flow=signup&method=sso";
    });

    (function () {
      var form = document.getElementById("signup-form");
      var msg = document.getElementById("signup-msg");
      var btn = document.getElementById("signup-submit");
      if (!form || !window.HoosOutSession) return;

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!form.reportValidity()) return;
        msg.style.display = "none";
        btn.disabled = true;
        window.HoosOutSession.signIn();
        window.location.href = "profile.html";
      });
    })();
  </script>
</body>
</html>
