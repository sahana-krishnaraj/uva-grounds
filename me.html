<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your profile — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="home.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>

    <nav class="nav-links">
      <a href="home.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">My Feed</a>
      <a
        href="events-uva.html"
        class="btn btn-ghost btn-sm"
        style="padding: 0.5rem 1rem"
        id="nav-uva-cville"
        hidden
        >UVA Events</a>
      <a href="post.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">Create</a>
      <a href="index.html" class="btn btn-primary btn-sm" style="padding: 0.5rem 1rem" id="nav-logout">Log out</a>
    </nav>
  </header>

  <main class="container me-page">
    <section class="me-hero">
      <div
        class="me-hero-avatar"
        data-hoosout-profile-avatar
        aria-hidden="true"
      >
        <img class="js-hoosout-avatar-img me-hero-avatar-img" alt="" hidden />
        <span class="js-hoosout-avatar-fallback">You</span>
      </div>
      <div class="me-hero-text">
        <h1 class="me-hero-name">Your HoosOut</h1>
        <p class="me-hero-handle">@you · demo profile · stored on this device only</p>
        <div class="me-stats">
          <div class="me-stat">
            <span class="me-stat-num" id="me-stat-following">0</span>
            <span class="me-stat-label">following</span>
          </div>
          <div class="me-stat">
            <span class="me-stat-num" id="me-stat-posted">0</span>
            <span class="me-stat-label">my events</span>
          </div>
          <div class="me-stat">
            <span class="me-stat-num" id="me-stat-going">0</span>
            <span class="me-stat-label">going</span>
          </div>
          <div class="me-stat">
            <span class="me-stat-num" id="me-stat-saved">0</span>
            <span class="me-stat-label">saved</span>
          </div>
        </div>
      </div>
    </section>
    <a href="settings.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem; width: 100%; display: block; text-align: center;">Edit profile</a>
    <div class="me-photo-toolbar">
      <input type="file" class="js-profile-photo-file" accept="image/*" hidden />
      <!-- <button type="button" class="btn btn-ghost btn-sm js-profile-photo-change">Change photo</button>
      <button type="button" class="btn btn-ghost btn-sm js-profile-photo-remove">Remove photo</button> -->
    </div>
<section class="me-bio-section">
  <div class="me-bio-grid">
    <div class="me-bio-item js-bio-bio" hidden>
      <span class="me-bio-label">About:</span>
      <span class="me-bio-value"></span>
    </div>
    <div class="me-bio-item js-bio-interests" hidden>
      <span class="me-bio-label">Interests:</span>
      <span class="me-bio-value"></span>
    </div>
    <!-- <div class="me-bio-item js-bio-vibe" hidden>
      <span class="me-bio-label">Vibe: </span>
      <span class="me-bio-value"></span>
    </div> -->
    <div class="me-bio-item js-bio-location" hidden>
      <span class="me-bio-label">Location: </span>
      <span class="me-bio-value"></span>
    </div>
    <div class="me-bio-item js-bio-schedule" hidden>
      <span class="me-bio-label">Availability:</span>
      <span class="me-bio-value"></span>
    </div>
  </div>
</section>
<!-- Tabs -->
    <div class="me-tabs" role="tablist" aria-label="Profile sections">
      <button type="button" class="me-tab me-tab--active" data-panel="following" role="tab" aria-selected="true">Following</button>
      <button type="button" class="me-tab" data-panel="posted" role="tab" aria-selected="false">My events</button>
      <button type="button" class="me-tab" data-panel="going" role="tab" aria-selected="false">Going</button>
      <button type="button" class="me-tab" data-panel="saved" role="tab" aria-selected="false">Saved</button>
    </div>

    <div id="me-panel-following" class="me-panel me-panel--active" role="tabpanel">
      <h2 class="me-panel-title">People you follow</h2>
      <div id="me-following-list" class="me-list"></div>
    </div>
    <div id="me-panel-posted" class="me-panel" role="tabpanel" hidden>
      <h2 class="me-panel-title">Events you published</h2>
      <div id="me-posted-list" class="me-list"></div>
    </div>
    <div id="me-panel-going" class="me-panel" role="tabpanel" hidden>
      <h2 class="me-panel-title">Events you’re going to</h2>
      <div id="me-going-list" class="me-list"></div>
    </div>
    <div id="me-panel-saved" class="me-panel" role="tabpanel" hidden>
      <h2 class="me-panel-title">Saved events</h2>
      <div id="me-saved-list" class="me-list"></div>
    </div>
  </main>

<!-- Profile Info Pull -->

<script src="js/session.js"></script>
<script src="js/events-store.js"></script>
<script src="js/profile-photo.js"></script>
<script src="js/me-page.js"></script>
<script>
  (function () {
    // 1. Nav visibility
    var uvaLink = document.getElementById("nav-uva-cville");
    if (uvaLink && window.HoosOutSession) {
      if (window.HoosOutSession.isSignedIn()) uvaLink.removeAttribute("hidden");
      else uvaLink.setAttribute("hidden", "");
    }

    // 2. Profile photo
    if (window.HoosOutProfilePhoto) {
      window.HoosOutProfilePhoto.initMeEditor(document.body);
    }

    // 3. Load profile from localStorage
    var raw = localStorage.getItem("hoosout_profile");
    if (!raw) return;

    var p;
    try { p = JSON.parse(raw); }
    catch (err) { console.warn("HoosOut: could not parse profile", err); return; }

    // 4. Full name + handle
    
    var fullName    = [p.firstName, p.lastName].filter(Boolean).join(" ");
    //var displayName = p.preferredName || p.firstName || "you";
    var handle      = "@" + p.preferredName.toLowerCase().replace(/\s+/g, "");

    var nameEl   = document.querySelector(".me-hero-name");
    var handleEl = document.querySelector(".me-hero-handle");

    if (nameEl) nameEl.textContent = fullName || "Your HoosOut";
    if (handleEl) {
      var meta = [handle];
      if (p.year)     meta.push(p.year);
      if (p.pronouns) meta.push(p.pronouns);
      handleEl.textContent = meta.join(" · ");
    }

    // 5. Avatar initials
    var fallbackEl = document.querySelector(".js-hoosout-avatar-fallback");
    if (fallbackEl && p.firstName) {
      var initials = (p.firstName[0] + (p.lastName ? p.lastName[0] : "")).toUpperCase();
      fallbackEl.textContent = initials;
    }

    // 6. Bio / intro strip
// 6. Bio section
var fields = [
  { key: "bio",       selector: ".js-bio-bio" },
  { key: "interests", selector: ".js-bio-interests" },
  { key: "vibe",      selector: ".js-bio-vibe" },
  { key: "location",  selector: ".js-bio-location" },
  { key: "schedule",  selector: ".js-bio-schedule" },
];
fields.forEach(function(f) {
  if (!p[f.key]) return;
  var item = document.querySelector(f.selector);
  if (!item) return;
  item.querySelector(".me-bio-value").textContent = p[f.key];
  item.removeAttribute("hidden");
});
  })();
</script>
</body>
</html>
