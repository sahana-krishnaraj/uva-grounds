<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit profile — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <header class="site-header">
    <a class="logo" href="home.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="home.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">My Feed</a>
      <a href="post.html" class="btn btn-primary btn-sm" style="padding: 0.5rem 1rem">Create</a>
    </nav>
  </header>
 
  <main class="container" style="max-width: 560px">
    <h1 class="section-title" style="text-align: left; margin-bottom: 0.5rem">Edit your profile</h1>
    <p class="section-sub" style="text-align: left; margin-bottom: 1.5rem">
      First name, Last name, Year are required. Everything else is optional.
    </p>

    <div class="auth-card" style="box-shadow: none; width: 100%">

      <!-- Profile photo -->
      <div class="profile-photo-setup" style="margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border)">
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600">Profile photo</label>
        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap">
          <div
            class="me-hero-avatar profile-setup-avatar"
            data-hoosout-profile-avatar
            style="width: 72px; height: 72px; font-size: 0.85rem"
          >
            <img class="js-hoosout-avatar-img me-hero-avatar-img" alt="" hidden />
            <span class="js-hoosout-avatar-fallback">You</span>
          </div>
          <div class="me-photo-toolbar" style="margin: 0">
            <input type="file" class="js-profile-photo-file" accept="image/*" hidden />
            <button type="button" class="btn btn-ghost btn-sm js-profile-photo-change">Upload photo</button>
            <button type="button" class="btn btn-ghost btn-sm js-profile-photo-remove">Remove</button>
          </div>
        </div>
      </div>

      <!-- Form -->
      <form class="form-grid" id="settings-form">

        <div class="two-col">
          <div>
            <label for="first-name">First name <span class="req-mark" aria-hidden="true">*</span></label>
            <input id="first-name" type="text" autocomplete="given-name" required />
          </div>
          <div>
            <label for="last-name">Last name <span class="req-mark" aria-hidden="true">*</span></label>
            <input id="last-name" type="text" autocomplete="family-name" required />
          </div>
        </div>

        <div>
          <label for="year">Year <span class="req-mark" aria-hidden="true">*</span></label>
          <select id="year" required>
            <option value="">Select</option>
            <option>First year</option>
            <option>Second year</option>
            <option>Third year</option>
            <option>Fourth year</option>
            <option>Grad</option>
          </select>
        </div>

        <div>
          <label for="pronouns">Pronouns</label>
          <input
            id="pronouns"
            type="text"
            list="pronouns-suggestions"
            placeholder="e.g. she/her, they/them"
          />
          <datalist id="pronouns-suggestions">
            <option value="she/her"></option>
            <option value="he/him"></option>
            <option value="they/them"></option>
            <option value="she/they"></option>
            <option value="he/they"></option>
            <option value="any pronouns"></option>
            <option value="use my name"></option>
            <option value="ask me"></option>
          </datalist>
        </div>

        <div>
          <label for="preferred-name">User Handle</label>
          <input id="preferred-name" type="text" autocomplete="nickname" />
        </div>

          <div>
          <label for="bio">About</label>
          <textarea id="bio" placeholder="Tell others about yourself (major, hometown, etc.)"></textarea>
        </div>

        <div>
          <label for="location-dorm">Location / dorm <span class="optional-mark">(optional)</span></label>
          <input
            id="location-dorm"
            type="text"
            autocomplete="address-line2"
            placeholder="e.g. Gibbons, etc."
          />
        </div>
                <div>
          <label for="schedule">Hobbies/Interests <span class="optional-mark">(optional)</span></label>
          <input
            id="interests"
            type="text"
            placeholder="e.g. art, gym, hiking, etc."
          />
      </div>

        <div>
          <label for="schedule">Availability <span class="optional-mark">(optional)</span></label>
          <input id="schedule" type="text" placeholder="Thu afternoons, weekend mornings" />
        </div>

        <div style="display: flex; gap: .5rem; align-items: center">
          <button type="submit" class="btn btn-primary">Save changes</button>
          <a href="profile.html" class="btn btn-ghost">Cancel</a>
        </div>

      </form>
    </div>
  </main>

  <script src="js/session.js"></script>
  <script src="js/profile-photo.js"></script>
  <script>
    (function () {
      // Init photo editor
      if (window.HoosOutProfilePhoto) {
        window.HoosOutProfilePhoto.initMeEditor(document.body);
      }

      // Pre-fill form from localStorage
      var raw = localStorage.getItem("hoosout_profile");
      var p = raw ? JSON.parse(raw) : {};

      document.getElementById("first-name").value     = p.firstName     || "";
      document.getElementById("last-name").value      = p.lastName      || "";
      document.getElementById("preferred-name").value = p.preferredName || "";
      document.getElementById("pronouns").value       = p.pronouns      || "";
      document.getElementById("year").value           = p.year          || "";
      document.getElementById("location-dorm").value  = p.location      || "";
      document.getElementById("interests").value  = p.interests      || "";
      // document.getElementById("vibe").value           = p.vibe          || "";
      document.getElementById("schedule").value       = p.schedule      || "";
      document.getElementById("bio").value            = p.bio           || "";
 
      // Save on submit
      var form = document.getElementById("settings-form");
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!form.reportValidity()) return;

        // Read latest from storage so we don't wipe any keys we don't touch
        var latest = localStorage.getItem("hoosout_profile");
        var profile = latest ? JSON.parse(latest) : {};

        profile.firstName     = document.getElementById("first-name").value.trim();
        profile.lastName      = document.getElementById("last-name").value.trim();
        profile.preferredName = document.getElementById("preferred-name").value.trim();
        profile.pronouns      = document.getElementById("pronouns").value.trim();
        profile.year          = document.getElementById("year").value;
        profile.location      = document.getElementById("location-dorm").value.trim();
        profile.interests     = document.getElementById("interests").value.trim();
        // profile.vibe          = document.getElementById("vibe").value.trim();
        profile.schedule      = document.getElementById("schedule").value.trim();
        profile.bio           = document.getElementById("bio").value.trim();

        localStorage.setItem("hoosout_profile", JSON.stringify(profile));

        // Go back to profile after saving
        window.location.href = "me.html";
      });
    })();
  </script>

</body>
</html>
