<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set up profile — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="events-uva.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">UVA &amp; Cville</a>
    </nav>
  </header>

  <main class="container" style="max-width: 560px">
    <h1 class="section-title" style="text-align: left; margin-bottom: 0.5rem">Build your profile</h1>
    <p class="section-sub" style="text-align: left; margin-bottom: 1.5rem">
      First name, last name, and year are required. Everything else is optional.
    </p>

    <div class="auth-card" style="box-shadow: none; width: 100%">
      <div class="profile-photo-setup" style="margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border)">
        <label style="display: block; margin-bottom: 0.5rem; font-weight: 600">Profile photo</label>
        <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap">
          <div
            class="me-hero-avatar profile-setup-avatar"
            data-hoosout-profile-avatar
            style="width: 72px; height: 72px; font-size: 0.85rem"
          >
            <img class="js-hoosout-avatar-img me-hero-avatar-img" alt="" hidden />
            <span class="js-hoosout-avatar-fallback">You</span>
          </div>
          <div class="me-photo-toolbar" style="margin: 0">
            <input type="file" class="js-profile-photo-file" accept="image/*" hidden />
            <button type="button" class="btn btn-ghost btn-sm js-profile-photo-change">Upload photo</button>
            <button type="button" class="btn btn-ghost btn-sm js-profile-photo-remove">Remove</button>
          </div>
        </div>
      </div>
      <form action="home.html" method="get" class="form-grid" id="profile-form">
        <div class="two-col">
          <div>
            <label for="first-name">First name <span class="req-mark" aria-hidden="true">*</span></label>
            <input
              id="first-name"
              name="first_name"
              type="text"
              autocomplete="given-name"
              required
            />
          </div>
          <div>
            <label for="last-name">Last name <span class="req-mark" aria-hidden="true">*</span></label>
            <input
              id="last-name"
              name="last_name"
              type="text"
              autocomplete="family-name"
              required
            />
          </div>
        </div>
        <div>
          <label for="preferred-name">User Name</label>
          <input
            id="preferred-name"
            name="HoosOut handle"
            type="text"
            autocomplete="nickname"
          />
        </div>
        <div>
          <label for="pronouns">Pronouns</label>
          <input
            id="pronouns"
            name="pronouns"
            type="text"
            list="pronouns-suggestions"
            placeholder="e.g. she/her, they/them"
          />
          <datalist id="pronouns-suggestions">
            <option value="she/her"></option>
            <option value="he/him"></option>
            <option value="they/them"></option>
            <option value="she/they"></option>
            <option value="he/they"></option>
            <option value="any pronouns"></option>
            <option value="use my name"></option>
            <option value="ask me"></option>
          </datalist>
        </div>
        <div>
          <label for="year">Year <span class="req-mark" aria-hidden="true">*</span></label>
          <select id="year" name="year" required>
            <option value="">Select</option>
            <option>First year</option>
            <option>Second year</option>
            <option>Third year</option>
            <option>Fourth year</option>
            <option>Grad</option>
          </select>
        </div>
        <div>
          <label for="location-dorm">Location / dorm <span class="optional-mark">(optional)</span></label>
          <input
            id="location-dorm"
            name="Location"
            type="text"
            autocomplete="address-line2"
            placeholder="e.g. Gibbons, etc."
          />
        </div>
        <div>
          <label for="interests">Top interests (comma-separated)</label>
          <input id="interests" name="interests" type="text" placeholder="hoops, econ, lifting, Bodo's" />
        </div>
        <div>
          <label for="vibe">Vibe tags</label>
          <input id="vibe" name="vibe" type="text" placeholder="chill, social, academic" />
        </div>
        <div>
          <label for="schedule">Typical free blocks (optional)</label>
          <input id="schedule" name="schedule" type="text" placeholder="Thu afternoons, weekend mornings" />
        </div>
        <div>
          <label for="bio">Bio (optional)</label>
          <textarea id="bio" name="bio" placeholder="Transfer from NOVA · IM soccer"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Save &amp; go to feed</button>
      </form>
    </div>
  </main>

 <script src="js/session.js"></script>
<script src="js/profile-photo.js"></script>
<script>
  (function () {
    if (window.HoosOutProfilePhoto) {
      window.HoosOutProfilePhoto.initMeEditor(document.body);
    }

    var form = document.getElementById("profile-form");
    if (!form) return;

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      if (!form.reportValidity()) return;

      var profile = {
        firstName:     document.getElementById("first-name").value.trim(),
        lastName:      document.getElementById("last-name").value.trim(),
        preferredName: document.getElementById("preferred-name").value.trim(),
        pronouns:      document.getElementById("pronouns").value.trim(),
        year:          document.getElementById("year").value,
        location:      document.getElementById("location-dorm").value.trim(),
        interests:     document.getElementById("interests").value.trim(),
        vibe:          document.getElementById("vibe").value.trim(),
        schedule:      document.getElementById("schedule").value.trim(),
        bio:           document.getElementById("bio").value.trim(),
      };

      localStorage.setItem("hoosout_profile", JSON.stringify(profile));

      if (window.HoosOutSession) window.HoosOutSession.signIn();
      window.location.href = "home.html";
    });
  })();
</script>
</body>
</html>
