<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="events-uva.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">UVA &amp; Cville</a>
      <a href="signup.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">Sign up</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Welcome back, Hoos</h1>
      <p class="auth-lead">Sign in with your UVA email and password.</p>

      <div class="trust-row">
        <span class="trust-pill">@virginia.edu</span>
        <span class="trust-pill">Exclusive network</span>
        <span class="trust-pill">Report &amp; block</span>
      </div>

      <form id="login-email-form" novalidate>
        <label for="email">UVA email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@virginia.edu or you@alumni.virginia.edu"
          required
          pattern=".+@(virginia\.edu|alumni\.virginia\.edu)$"
          title="Must end with @virginia.edu or @alumni.virginia.edu"
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          required
        />

        <button type="submit" class="btn btn-primary btn-full" id="login-email-submit">
          Log in
        </button>
      </form>

      <p id="login-email-msg" class="auth-form-msg" style="display: none; margin-top: 0.75rem; font-size: 0.88rem"></p>

      <p class="auth-footer">
        First time here? <a href="signup.html">Create an account</a>
      </p>
    </div>
  </main>

  <script src="js/session.js"></script>
  <script type="module">
    import { supabase } from "./js/supabase.js";

    var form = document.getElementById("login-email-form");
    var btn = document.getElementById("login-email-submit");
    var msg = document.getElementById("login-email-msg");

    function showError(text) {
      msg.style.display = "";
      msg.style.color = "red";
      msg.textContent = text;
    }

    function hideMsg() {
      msg.style.display = "none";
      msg.textContent = "";
    }

    async function postJson(url, body) {
      var r = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      var data = {};
      try {
        data = await r.json();
      } catch (_) {}
      return { ok: r.ok, data: data };
    }

    if (form) {
      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        hideMsg();
        if (!form.reportValidity()) return;

        var email = document.getElementById("email").value.trim();
        var password = document.getElementById("password").value;

        btn.disabled = true;
        btn.textContent = "Signing in…";

        var res;
        try {
          res = await postJson("/api/auth/login", { email: email, password: password });
        } catch (err) {
          showError(
            "Could not reach the server. Use the app from the local server (run npm start in the server folder)."
          );
          btn.disabled = false;
          btn.textContent = "Log in";
          return;
        }

        if (!res.ok) {
          showError(
            res.data.error || "Incorrect email or password."
          );
          btn.disabled = false;
          btn.textContent = "Log in";
          return;
        }

        if (res.data.access_token && res.data.refresh_token) {
          var sr = await supabase.auth.setSession({
            access_token: res.data.access_token,
            refresh_token: res.data.refresh_token,
          });
          if (sr.error) {
            showError(sr.error.message || "Could not start session. Try again.");
            btn.disabled = false;
            btn.textContent = "Log in";
            return;
          }
        }

        if (window.HoosOutSession) window.HoosOutSession.signIn();
        window.location.href = "home.html";
      });
    }
  </script>
</body>
</html>
