<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="events-uva.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">UVA &amp; Cville</a>
      <a href="signup.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">Sign up</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Welcome back, Hoos</h1>
      <p class="auth-lead">Demo: log in with UVA SSO or your @virginia.edu email.</p>

      <div class="trust-row">
        <span class="trust-pill">@virginia.edu</span>
        <span class="trust-pill">Exclusive network</span>
        <span class="trust-pill">Report &amp; block</span>
      </div>

      <button type="button" class="btn btn-primary btn-full" id="btn-sso">
        Continue with UVA SSO
      </button>
      <p style="font-size: 0.8rem; color: var(--text-muted); margin: 0.5rem 0 0; text-align: center">
        Demo: optional confirmation screen before profile
      </p>

      <div class="divider">or school email</div>

      <form id="login-email-form" novalidate>
        <label for="email">UVA email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@virginia.edu"
          required
          pattern=".+@virginia\.edu$"
          title="Use your @virginia.edu address"
        />
        <button type="submit" class="btn btn-ghost btn-full" id="login-email-submit">Continue</button>
      </form>
      <p id="login-email-msg" class="auth-form-msg" style="display: none; margin-top: 0.75rem; font-size: 0.88rem"></p>

      <p class="auth-footer">
        First time here? <a href="signup.html">Create an account</a>
      </p>
    </div>
  </main>

  <script src="js/session.js"></script>
  <script>
    document.getElementById("btn-sso").addEventListener("click", function () {
      window.location.href = "verify.html?method=sso";
    });

    (function () {
      var form = document.getElementById("login-email-form");
      var msg = document.getElementById("login-email-msg");
      var btn = document.getElementById("login-email-submit");
      if (!form || !window.HoosOutSession) return;

      form.addEventListener("submit", function (e) {
        e.preventDefault();
        if (!form.reportValidity()) return;
        msg.style.display = "none";
        btn.disabled = true;
        window.HoosOutSession.signIn();
        window.location.href = "profile.html";
      });
    })();
  </script>
</body>
</html>
