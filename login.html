<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="events-uva.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">UVA &amp; Cville</a>
      <a href="signup.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">Sign up</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Welcome back, Hoos!</h1>
      <p class="auth-lead">Sign in with your UVA email and password.</p>

      <form id="login-form" novalidate>
        <label for="email">UVA email</label>
        <input
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          placeholder="you@virginia.edu"
          required
          pattern=".+@virginia\.edu$"
          title="Must be a @virginia.edu address"
        />

        <label for="password">Password</label>
        <input
          id="password"
          name="password"
          type="password"
          autocomplete="current-password"
          placeholder="Your password"
          required
        />

        <button type="submit" class="btn btn-primary btn-full" id="login-submit">
          Log in
        </button>
      </form>

      <p id="login-msg" class="auth-form-msg" style="display: none; margin-top: 0.75rem; font-size: 0.88rem"></p>

      <p class="auth-footer">
        First time here? <a href="signup.html">Create an account</a>
      </p>
    </div>
  </main>

  <script type="module">
    import { supabase } from "./js/supabase.js";

    var form = document.getElementById("login-form");
    var btn = document.getElementById("login-submit");
    var msg = document.getElementById("login-msg");

    function showError(text) {
      msg.style.display = "";
      msg.style.color = "red";
      msg.textContent = text;
    }

    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      if (!form.reportValidity()) return;

      var email = document.getElementById("email").value.trim();
      var password = document.getElementById("password").value;

      btn.disabled = true;
      btn.textContent = "Logging in…";

      const { error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        showError("Incorrect email or password. Try again.");
        btn.disabled = false;
        btn.textContent = "Log in";
        return;
      }

      // Success — go straight to profile
      window.location.href = "profile.html";
    });
  </script>
</body>
</html>
