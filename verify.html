<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify — HoosOut</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="logo" href="index.html">
      <span class="logo-mark" aria-hidden="true">
        <img src="images/logo-mark.svg" width="38" height="38" alt="" />
      </span>
      <span class="logo-type">Hoos<span class="logo-type-accent">Out</span></span>
    </a>
    <nav class="nav-links">
      <a href="events-uva.html" class="btn btn-ghost btn-sm" style="padding: 0.5rem 1rem">UVA &amp; Cville</a>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">
      <h1>Verify your student status</h1>
      <p class="auth-lead">You’re one step away. In production this would confirm UVA SSO or a code sent to your inbox. For this demo, any code works.</p>

      <div class="trust-row">
        <span class="trust-pill">No anonymous noise</span>
        <span class="trust-pill">Safer meetups</span>
      </div>

      <form action="profile.html" method="get" id="verify-form">
        <div id="code-fields">
          <label for="code">6-digit code</label>
          <input id="code" name="code" type="text" inputmode="numeric" maxlength="6" placeholder="000000" required />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Continue</button>
      </form>

      <p class="auth-footer">
        Wrong email? <a href="signup.html">Go back</a>
      </p>
    </div>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      if (params.get("method") === "sso") {
        document.querySelector(".auth-lead").textContent =
          "SSO flow (demo): In production your IdP would confirm you. Continue to finish profile setup.";
        var block = document.getElementById("code-fields");
        if (block) block.style.display = "none";
        var codeInput = document.getElementById("code");
        if (codeInput) codeInput.removeAttribute("required");
      }
    })();
  </script>
</body>
</html>
